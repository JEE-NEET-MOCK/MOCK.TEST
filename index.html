<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CBT Exam System</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 0; background: #f3f4f6; color: #1f2937; }
        .header { background: #2563eb; color: white; padding: 15px; text-align: center; font-size: 18px; font-weight: bold; position: sticky; top: 0; z-index: 100;}
        .container { display: flex; flex-direction: column; height: calc(100vh - 54px); }
        .main { padding: 15px; flex: 1; overflow-y: auto; }
        .question-box { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 20px; font-size: 17px; overflow-x: auto;}
        .options button { display: block; width: 100%; padding: 12px; margin: 8px 0; border: 2px solid #e5e7eb; border-radius: 8px; background: white; text-align: left; font-size: 16px; cursor: pointer; transition: 0.2s;}
        .options button.selected { background: #dbeafe; border-color: #3b82f6; }
        .bottom-area { background: white; border-top: 2px solid #e5e7eb; }
        .grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 8px; padding: 15px; max-height: 150px; overflow-y: auto; background: #f9fafb;}
        .grid-btn { padding: 8px 0; border-radius: 5px; border: 1px solid #d1d5db; background: white; font-weight: bold; cursor: pointer; text-align: center;}
        .grid-btn.answered { background: #22c55e; color: white; border: none; }
        .grid-btn.marked { background: #a855f7; color: white; border: none; }
        .grid-btn.active { box-shadow: 0 0 0 2px #1d4ed8; }
        .controls { display: flex; justify-content: space-between; padding: 10px 15px;}
        .btn { padding: 10px 12px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; color: white; flex: 1; margin: 0 5px;}
        .btn-prev { background: #6b7280; }
        .btn-mark { background: #a855f7; }
        .btn-next { background: #3b82f6; }
        .btn-submit { background: #ef4444; width: 100%; padding: 15px; font-size: 18px; font-weight: bold; color: white; border: none; cursor: pointer;}
        #loader { text-align: center; margin-top: 50%; font-size: 20px; font-weight: bold; color: #3b82f6; }
    </style>
</head>
<body>

    <div class="header" id="timer">⏱ Loading Test...</div>
    <div id="loader">Connecting to Telegram Secure Server... ⏳</div>

    <div class="container" id="exam-ui" style="display: none;">
        <div class="main">
            <h3 style="margin-top: 0;" id="q-no">Question 1</h3>
            <div class="question-box" id="q-text"></div>
            <div class="options" id="options-container">
                <button onclick="selectOption('A')" id="opt-A">A</button>
                <button onclick="selectOption('B')" id="opt-B">B</button>
                <button onclick="selectOption('C')" id="opt-C">C</button>
                <button onclick="selectOption('D')" id="opt-D">D</button>
            </div>
        </div>

        <div class="bottom-area">
            <div class="controls">
                <button class="btn btn-prev" onclick="nav(-1)">⬅️ Prev</button>
                <button class="btn btn-mark" onclick="markReview()">🟣 Mark</button>
                <button class="btn btn-next" onclick="nav(1)">Next ➡️</button>
            </div>
            <div class="grid" id="q-grid"></div>
            <button class="btn-submit" onclick="submitExam()">📝 Submit Exam</button>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const testId = urlParams.get('testid');
        const tPath = urlParams.get('tpath');
        const botUsername = urlParams.get('bot');
        
        let questions = [];
        let currentIdx = 0;
        let answers = {};
        let statuses = {}; 

        window.Telegram.WebApp.expand();

        // 🚀 FETCH SECURELY FROM TELEGRAM'S OWN SERVER (ZERO CRASHES)
        fetch(`https://api.telegra.ph/getPage/${tPath}?return_content=true`)
            .then(res => res.json())
            .then(data => {
                let jsonString = "";
                data.result.content.forEach(p => {
                    if (p.children && p.children.length > 0 && typeof p.children[0] === 'string') {
                        jsonString += p.children[0];
                    }
                });
                questions = JSON.parse(jsonString);
                document.getElementById('loader').style.display = 'none';
                document.getElementById('exam-ui').style.display = 'flex';
                buildGrid();
                showQuestion(0);
                startTimer(questions.length * 2 * 60);
            })
            .catch(err => alert("Secure Load Error: " + err));

        function buildGrid() {
            const grid = document.getElementById('q-grid');
            grid.innerHTML = '';
            for(let i=0; i<questions.length; i++) {
                let btn = document.createElement('div');
                btn.className = 'grid-btn';
                btn.id = 'grid-' + i;
                btn.innerText = i + 1;
                btn.onclick = () => showQuestion(i);
                grid.appendChild(btn);
            }
        }

        function showQuestion(idx) {
            currentIdx = idx;
            document.getElementById('q-no').innerText = `Question ${idx + 1} of ${questions.length}`;
            let qData = questions[idx];
            let latexCode = qData.l ? `\\[ \\begin{aligned} ${qData.l} \\end{aligned} \\]` : qData.p.replace(/\n/g, '<br><br>');
            document.getElementById('q-text').innerHTML = latexCode;
            MathJax.typesetPromise();

            ['A', 'B', 'C', 'D'].forEach(opt => {
                let btn = document.getElementById('opt-' + opt);
                if(answers[idx] === opt) btn.classList.add('selected');
                else btn.classList.remove('selected');
            });

            document.querySelectorAll('.grid-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('grid-' + idx).classList.add('active');
        }

        function selectOption(opt) {
            answers[currentIdx] = opt;
            statuses[currentIdx] = 'answered';
            document.getElementById('grid-' + currentIdx).className = 'grid-btn answered active';
            showQuestion(currentIdx);
        }

        function markReview() {
            statuses[currentIdx] = 'marked';
            document.getElementById('grid-' + currentIdx).className = 'grid-btn marked active';
            nav(1);
        }

        function nav(step) {
            let newIdx = currentIdx + step;
            if(newIdx >= 0 && newIdx < questions.length) showQuestion(newIdx);
        }

        // 🚀 OFFLINE COMPRESSION ALGORITHM (NO DATABASE UPLOAD NEEDED)
        function encodeAnswers() {
            let charSet = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789-_";
            let encoded = "";
            let total = questions.length;
            for (let i = 0; i < total; i += 3) {
                let val = 0;
                for (let j = 0; j < 3; j++) {
                    let ans = answers[i + j];
                    let mult = 0;
                    if (ans === 'A') mult = 1;
                    else if (ans === 'B') mult = 2;
                    else if (ans === 'C') mult = 3;
                    else if (ans === 'D') mult = 4;
                    val = val * 5 + mult;
                }
                encoded += charSet[val];
            }
            return encoded;
        }

        function submitExam() {
            if(!confirm("Are you sure you want to submit the exam?")) return;
            
            document.getElementById('exam-ui').style.display = 'none';
            document.getElementById('loader').innerText = "Calculating Scores... 🚀";
            document.getElementById('loader').style.display = 'block';

            let payload = encodeAnswers();
            // Send Data instantly back to Telegram without any Database!
            window.Telegram.WebApp.openTelegramLink(`https://t.me/${botUsername}?start=res_${testId}_${payload}`);
            window.Telegram.WebApp.close();
        }

        function startTimer(duration) {
            let timer = duration, minutes, seconds;
            setInterval(function () {
                minutes = parseInt(timer / 60, 10);
                seconds = parseInt(timer % 60, 10);
                minutes = minutes < 10 ? "0" + minutes : minutes;
                seconds = seconds < 10 ? "0" + seconds : seconds;
                document.getElementById('timer').textContent = "⏱ Time Remaining: " + minutes + ":" + seconds;
                if (--timer < 0) submitExam();
            }, 1000);
        }
    </script>
</body>
</html>
