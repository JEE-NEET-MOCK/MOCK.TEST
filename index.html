<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CBT Exam System</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        window.MathJax = {
          tex: { 
            inlineMath: [['$', '$'], ['$$', '$$'], ['\\(', '\\)']], 
            displayMath: [['\\[', '\\]']],
            processEscapes: true
          },
          chtml: { displayAlign: 'left' }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 0; background: #f3f4f6; color: #1f2937; }
        .header { background: #2563eb; color: white; padding: 15px; text-align: center; font-size: 18px; font-weight: bold; position: sticky; top: 0; z-index: 100;}
        .container { display: flex; flex-direction: column; height: calc(100vh - 54px); }
        .main { padding: 15px; flex: 1; overflow-y: auto; }
        
        .question-box { 
            background: white; padding: 20px; border-radius: 10px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 20px; 
            font-size: 17px; line-height: 1.6;
            white-space: normal; 
            word-wrap: break-word; 
            overflow-x: auto; 
        }
        
        .options button { display: block; width: 100%; padding: 12px; margin: 8px 0; border: 2px solid #e5e7eb; border-radius: 8px; background: white; text-align: left; font-size: 16px; cursor: pointer; transition: 0.2s; line-height: 1.4;}
        .options button.selected { background: #dbeafe; border-color: #3b82f6; }
        .bottom-area { background: white; border-top: 2px solid #e5e7eb; }
        .grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 8px; padding: 15px; max-height: 150px; overflow-y: auto; background: #f9fafb;}
        .grid-btn { padding: 8px 0; border-radius: 5px; border: 1px solid #d1d5db; background: white; font-weight: bold; cursor: pointer; text-align: center;}
        .grid-btn.answered { background: #22c55e; color: white; border: none; }
        .grid-btn.marked { background: #a855f7; color: white; border: none; }
        .grid-btn.active { box-shadow: 0 0 0 2px #1d4ed8; }
        .controls { display: flex; justify-content: space-between; padding: 10px 15px;}
        .btn { padding: 10px 12px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; color: white; flex: 1; margin: 0 5px;}
        .btn-prev { background: #6b7280; }
        .btn-mark { background: #a855f7; }
        .btn-next { background: #3b82f6; }
        .btn-submit { background: #ef4444; width: 100%; padding: 15px; font-size: 18px; font-weight: bold; color: white; border: none; cursor: pointer;}
        #loader { text-align: center; margin-top: 50%; font-size: 20px; font-weight: bold; color: #3b82f6; padding: 20px;}
    </style>
</head>
<body>

    <div class="header" id="timer">⏱ Loading Test...</div>
    <div id="loader">Connecting to Telegram Secure Server... ⏳</div>

    <div class="container" id="exam-ui" style="display: none;">
        <div class="main">
            <h3 style="margin-top: 0;" id="q-no">Question 1</h3>
            <div class="question-box" id="q-text"></div>
            <div class="options" id="options-container">
                <!-- Dynamically generated -->
            </div>
        </div>

        <div class="bottom-area">
            <div class="controls">
                <button class="btn btn-prev" onclick="nav(-1)">⬅️ Prev</button>
                <button class="btn btn-mark" onclick="markReview()">🟣 Mark</button>
                <button class="btn btn-next" onclick="nav(1)">Next ➡️</button>
            </div>
            <div class="grid" id="q-grid"></div>
            <button class="btn-submit" onclick="submitExam()">📝 Submit Exam</button>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const testId = urlParams.get('testid');
        const tPath = urlParams.get('tpath');
        const botUsername = urlParams.get('bot');
        
        let questions = [];
        let currentIdx = 0;
        let answers = {};
        let statuses = {}; 

        window.Telegram.WebApp.expand();

        // Decode Base64 Data
        const proxyBase = urlParams.get('api') || 'https://mock-test-1-qaez.onrender.com';
        const targetUrl = `https://api.telegra.ph/getPage/${tPath}?return_content=true`;
        const customProxy = testId ? `${proxyBase}/get_test?testid=${testId}` : `${proxyBase}/get_test?tpath=${tPath}`;

        async function fetchWithFallback() {
            try {
                let res = await fetch(customProxy);
                if (!res.ok) throw new Error("Proxy failed");
                return await res.json();
            } catch (e1) {
                let res2 = await fetch(targetUrl);
                return await res2.json();
            }
        }

        fetchWithFallback()
            .then(data => {
                if(!data.ok) throw new Error("API Not OK: " + (data.error || "Unknown"));
                
                let b64String = "";
                data.result.content.forEach(p => {
                    if (p.children) {
                        p.children.forEach(child => {
                            if (typeof child === 'string') {
                                b64String += child;
                            }
                        });
                    }
                });
                
                let jsonString = decodeURIComponent(escape(window.atob(b64String.trim())));
                questions = JSON.parse(jsonString);
                
                document.getElementById('loader').style.display = 'none';
                document.getElementById('exam-ui').style.display = 'flex';
                buildGrid();
                showQuestion(0);
                const suggestedTime = urlParams.get('time') ? parseInt(urlParams.get('time')) * 60 : questions.length * 2 * 60;
                startTimer(suggestedTime);
            })
            .catch(err => {
                document.getElementById('loader').innerHTML = `❌ Data Decoding Error.<br>Details: ${err.message}`;
            });

        // --- ANTI CHEAT SYSTEM ---
        let cheatWarnings = 0;
        document.addEventListener("visibilitychange", () => {
            if (document.hidden && document.getElementById('exam-ui').style.display !== 'none') {
                cheatWarnings++;
                if (cheatWarnings >= 3) {
                    alert("🚨 ANTI-CHEAT TRIGGERED!\nYou have switched tabs 3 times. Your test is being automatically submitted!");
                    submitExam(true);
                } else {
                    alert(`⚠️ WARNING (${cheatWarnings}/3): Do not switch tabs or open other apps!\nYour test will be auto-submitted on the 3rd warning.`);
                }
            }
        });

        function buildGrid() {
            const grid = document.getElementById('q-grid');
            grid.innerHTML = '';
            for(let i=0; i<questions.length; i++) {
                let btn = document.createElement('div');
                btn.className = 'grid-btn';
                btn.id = 'grid-' + i;
                btn.innerText = i + 1;
                btn.onclick = () => showQuestion(i);
                grid.appendChild(btn);
            }
        }

        function showQuestion(idx) {
            currentIdx = idx;
            let qData = questions[idx];
            
            let subjectName = qData.s ? qData.s : "Subject";
            document.getElementById('q-no').innerHTML = `<span style="color: #3b82f6;">[${subjectName}]</span> Question ${idx + 1} of ${questions.length}`;
            
            let content = qData.l ? qData.l : qData.p;
            document.getElementById('q-text').innerHTML = content;
            
            if (window.MathJax && window.MathJax.typesetPromise) {
                MathJax.typesetClear([document.getElementById('q-text')]);
                MathJax.typesetPromise([document.getElementById('q-text')]).catch(err => console.log(err));
            }

            const optionsContainer = document.getElementById('options-container');
            optionsContainer.innerHTML = '';

            if (qData.type === 'INTEGER') {
                let val = answers[idx] || '';
                optionsContainer.innerHTML = `
                    <div style="margin-top: 15px;">
                        <label style="font-weight: bold; font-size: 16px;">Type your integer answer:</label><br>
                        <input type="number" id="int-input" value="${val}" oninput="selectInteger(this.value)" placeholder="Enter number..." style="width: 100%; padding: 12px; margin-top: 10px; border: 2px solid #e5e7eb; border-radius: 8px; font-size: 18px; box-sizing: border-box;">
                    </div>
                `;
            } else {
                ['A', 'B', 'C', 'D'].forEach(opt => {
                    let btn = document.createElement('button');
                    btn.id = 'opt-' + opt;
                    btn.onclick = () => selectOption(opt);
                    btn.innerText = opt;
                    if(answers[idx] === opt) btn.classList.add('selected');
                    optionsContainer.appendChild(btn);
                });
            }

            document.querySelectorAll('.grid-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('grid-' + idx).classList.add('active');
        }

        function selectOption(opt) {
            answers[currentIdx] = opt;
            statuses[currentIdx] = 'answered';
            document.getElementById('grid-' + currentIdx).className = 'grid-btn answered active';
            showQuestion(currentIdx);
        }

        function selectInteger(val) {
            if (val.trim() !== '') {
                answers[currentIdx] = val.trim();
                statuses[currentIdx] = 'answered';
                document.getElementById('grid-' + currentIdx).className = 'grid-btn answered active';
            } else {
                delete answers[currentIdx];
                statuses[currentIdx] = 'unanswered';
                document.getElementById('grid-' + currentIdx).className = 'grid-btn active';
            }
        }

        function markReview() {
            statuses[currentIdx] = 'marked';
            document.getElementById('grid-' + currentIdx).className = 'grid-btn marked active';
            nav(1);
        }

        function nav(step) {
            let newIdx = currentIdx + step;
            if(newIdx >= 0 && newIdx < questions.length) showQuestion(newIdx);
        }

        async function submitExam(force = false) {
            if(!force && !confirm("Are you sure you want to submit the exam?")) return;
            
            document.getElementById('exam-ui').style.display = 'none';
            document.getElementById('loader').innerText = "Uploading Answers... 🚀";
            document.getElementById('loader').style.display = 'block';

            try {
                const mapAns = {'A':0, 'B':1, 'C':2, 'D':3, 'X':4};
                const chars = "abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789-_";
                let encoded = "";
                
                let i = 0;
                while (i < questions.length) {
                    let v1 = mapAns[answers[i] || 'X'];
                    let v2 = (i + 1 < questions.length) ? mapAns[answers[i+1] || 'X'] : 4;
                    let val = v1 * 5 + v2;
                    encoded += chars[val];
                    i += 2;
                }

                // Send the path back to the bot
                let payload = `res_${testId}_${encoded}`;
                window.Telegram.WebApp.openTelegramLink(`https://t.me/${botUsername}?start=${payload}`);
                window.Telegram.WebApp.close();
            } catch (err) {
                alert("Failed to submit: " + err.message);
                document.getElementById('loader').style.display = 'none';
                document.getElementById('exam-ui').style.display = 'flex';
            }
        }

        function startTimer(duration) {
            let timer = duration, hours, minutes, seconds;
            setInterval(function () {
                hours = parseInt(timer / 3600, 10);
                minutes = parseInt((timer % 3600) / 60, 10);
                seconds = parseInt(timer % 60, 10);
                
                let hStr = hours > 0 ? hours + ":" : "";
                let mStr = minutes < 10 ? "0" + minutes : minutes;
                let sStr = seconds < 10 ? "0" + seconds : seconds;
                
                document.getElementById('timer').textContent = "⏱ Time Remaining: " + hStr + mStr + ":" + sStr;
                
                if (--timer < 0) {
                    alert("⏰ Time is up! Auto-submitting your test.");
                    submitExam(true);
                }
            }, 1000);
        }
    </script>
</body>
</html>
